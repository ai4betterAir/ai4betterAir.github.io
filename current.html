<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Current NSW Air Quality Nowcasting Dashboard Link</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f6f8;
      color: #1f2933;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(640px, 100%);
      background: #ffffff;
      border: 1px solid #d8dee6;
      border-radius: 8px;
      padding: 28px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 24px;
      line-height: 1.25;
    }

    p {
      margin: 0 0 18px;
      line-height: 1.5;
    }

    a {
      color: #005eb8;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .link-box {
      margin: 0 0 18px;
      padding: 12px;
      border: 1px solid #c9d6e2;
      border-radius: 6px;
      background: #f8fafc;
      overflow-wrap: anywhere;
    }

    .button {
      display: inline-block;
      max-width: 100%;
      box-sizing: border-box;
      padding: 11px 16px;
      border-radius: 6px;
      background: #005eb8;
      color: #ffffff;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>Current Live NSW Air Quality Nowcasting Dashboard Link</h1>
    <p id="message">Finding the current live NSW Air Quality Nowcasting Dashboard...</p>
    <div id="link-box" class="link-box" hidden></div>
    <p><a id="open-link" class="button" href="#" aria-disabled="true">Open NSW Air Quality Nowcasting Dashboard</a></p>
  </main>

  <script>
    const linkSources = [
      "current.json",
      "https://raw.githubusercontent.com/ai4betterAir/ai4betterAir.github.io/main/current.json"
    ];

    function isValidDashboardUrl(url) {
      try {
        const parsed = new URL(url);
        return parsed.protocol === "https:" && parsed.hostname.endsWith(".lhr.life");
      } catch (error) {
        return false;
      }
    }

    function updatedTime(data) {
      const time = Date.parse(data.updated_at || "");
      return Number.isFinite(time) ? time : 0;
    }

    function candidatesFromData(data) {
      const candidates = [];

      if (!data || typeof data !== "object") {
        return candidates;
      }

      if (isValidDashboardUrl(data.url)) {
        candidates.push({
          url: data.url,
          updated_at: data.updated_at || ""
        });
      }

      if (Array.isArray(data.urls)) {
        for (const item of data.urls) {
          const candidate = typeof item === "string" ? { url: item, updated_at: data.updated_at || "" } : item;
          if (candidate && isValidDashboardUrl(candidate.url)) {
            candidates.push({
              url: candidate.url,
              updated_at: candidate.updated_at || data.updated_at || ""
            });
          }
        }
      }

      return candidates;
    }

    async function probeDashboardUrl(url, timeoutMs = 2500) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);
      try {
        await fetch(url, {
          method: "GET",
          mode: "no-cors",
          cache: "no-store",
          signal: controller.signal
        });
        return true;
      } catch (error) {
        return false;
      } finally {
        clearTimeout(timer);
      }
    }

    async function fetchLinkSource(source) {
      const separator = source.includes("?") ? "&" : "?";
      const response = await fetch(`${source}${separator}ts=${Date.now()}`, { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`${source} returned ${response.status}`);
      }

      const data = await response.json();
      const candidates = candidatesFromData(data);
      if (!candidates.length) {
        throw new Error(`${source} has no valid dashboard URL`);
      }

      return candidates;
    }

    function shouldAutoRedirect() {
      const params = new URLSearchParams(window.location.search);
      return !params.has("stay");
    }

    async function loadCurrentLink() {
      const message = document.getElementById("message");
      const linkBox = document.getElementById("link-box");
      const openLink = document.getElementById("open-link");

      try {
        const results = await Promise.allSettled(linkSources.map(fetchLinkSource));
        const links = results
          .filter((result) => result.status === "fulfilled")
          .flatMap((result) => result.value)
          .filter((data, index, all) => all.findIndex((item) => item.url === data.url) === index)
          .sort((left, right) => updatedTime(right) - updatedTime(left));

        if (!links.length) {
          throw new Error("No valid dashboard URL is published.");
        }

        let data = null;
        for (const candidate of links) {
          if (await probeDashboardUrl(candidate.url)) {
            data = candidate;
            break;
          }
        }

        if (!data) {
          const latest = links[0];
          openLink.href = latest.url;
          openLink.removeAttribute("aria-disabled");
          openLink.textContent = "Open latest published link";
          message.textContent = "No live dashboard tunnel is reachable right now. The latest published link is shown below, but it may be stale.";
          linkBox.hidden = false;
          linkBox.innerHTML = "";
          const anchor = document.createElement("a");
          anchor.href = latest.url;
          anchor.textContent = latest.url;
          anchor.rel = "noopener";
          linkBox.appendChild(anchor);
          return;
        }

        message.textContent = "Current live NSW Air Quality Nowcasting Dashboard:";
        linkBox.hidden = false;
        linkBox.innerHTML = "";
        const anchor = document.createElement("a");
        anchor.href = data.url;
        anchor.textContent = data.url;
        anchor.rel = "noopener";
        linkBox.appendChild(anchor);

        openLink.href = data.url;
        openLink.removeAttribute("aria-disabled");
        openLink.textContent = "Open NSW Air Quality Nowcasting Dashboard";

        if (shouldAutoRedirect()) {
          message.textContent = "Opening the current live NSW Air Quality Nowcasting Dashboard...";
          setTimeout(() => {
            window.location.replace(data.url);
          }, 400);
        }
      } catch (error) {
        message.textContent = "The current dashboard link is not available yet.";
        linkBox.hidden = true;
        openLink.href = "#";
        openLink.setAttribute("aria-disabled", "true");
      }
    }

    loadCurrentLink();
    setInterval(loadCurrentLink, 30000);
  </script>
</body>
</html>
